global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: pipeline
    static_configs:
      - targets: ["pipeline-exporter:9101"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

